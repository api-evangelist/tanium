specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Tanium
providerId: tanium
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Endpoint Management
  - Security
  - Rate Limiting
description: Tanium does not publish a unified public rate-limit specification for its REST and
  module APIs. Concurrency and throttling are documented in customer-portal documentation that
  requires a Tanium subscription to access.
sources:
  - https://www.tanium.com/products/tanium-platform/
notes: Rate-limit details are gated behind authenticated Tanium documentation. No public
  per-second / per-minute numbers documented externally.
responseCodes:
  throttled: 429
limits:
  - name: Customer-portal documented limits
    scope: account
    metric: varies
    limit: see authenticated Tanium documentation
policies:
  - name: Authenticated Documentation
    description: Throttling, concurrency, and quota behavior are documented inside the Tanium
      customer documentation portal, which is gated to subscribers.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
