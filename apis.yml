  - aid: tanium:connect-api
    name: Tanium Connect API
    description: The Tanium Connect REST API allows creating, editing, and managing connections for delivering endpoint data
      to downstream systems via files, syslog, webhooks, and other destination types on a schedule or triggered by events.
    humanURL: https://docs.tanium.com/connect/connect/index.html
    tags:
