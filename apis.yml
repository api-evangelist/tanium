aid: tanium
name: Tanium
description: Tanium is a unified endpoint management and security platform that provides real-time visibility and control
  across all endpoints. It offers a suite of APIs including a GraphQL-based API Gateway and platform REST APIs for integrating
  with endpoint management, security, compliance, and threat response capabilities.
type: Index
position: Consumer
access: 3rd-Party
image: https://www.tanium.com/images/tanium-logo.png
tags:
  - Compliance
  - Endpoint Management
  - Patch Management
  - Security
  - Threat Detection
  - Unified Endpoint Management
created: '2025-02-06'
modified: '2026-05-19'
url: https://raw.githubusercontent.com/api-evangelist/tanium/refs/heads/main/apis.yml
specificationVersion: '0.18'
apis:
  - aid: tanium:api-gateway
    name: Tanium API Gateway
    description: The Tanium API Gateway is a GraphQL interface for querying data and taking action in Tanium. It is the preferred
      method for integrating with Tanium, supporting asset queries, endpoint actions, and data retrieval across the platform.
    humanURL: https://docs.tanium.com/api_gateway/api_gateway/overview.html
    tags:
    - API Gateway
    - Endpoints
    - GraphQL
    - Integration
    - Queries
    properties:
    - type: Documentation
      url: https://docs.tanium.com/api_gateway/api_gateway/overview.html
    - type: Reference
      url: https://docs.tanium.com/api_gateway/api_gateway/api_gateway_examples.html
    - type: GettingStarted
      url: https://docs.tanium.com/api_gateway/api_gateway/api_gateway.html
    - type: GraphQLSchema
      url: https://developer.tanium.com/site/global/apis/graphql/schema/
  - aid: tanium:platform-rest-api
    name: Tanium Platform REST API
    description: The Tanium Platform REST API provides access to core platform functionality including gathering endpoint information,
      deploying actions, evaluating deployment health, managing certificates, updating packages, and downloading audit logs.
    humanURL: https://developer.tanium.com/apis/api_intro
    tags:
    - Actions
    - Endpoints
    - Platform
    - REST API
    - Security
    properties:
    - type: Documentation
      url: https://developer.tanium.com/apis/api_intro
    - type: IntegrationGuide
      url: https://developer.tanium.com/guides/core-platform/integration_methods
    - type: Authentication
