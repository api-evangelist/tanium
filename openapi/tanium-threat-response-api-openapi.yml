                          type: string
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    apiToken:
      type: apiKey
      name: session
      in: header
      description: >-
        API token passed in the session header for authenticating with the
        Tanium Threat Response API.
  schemas:
    Error:
      type: object
      properties:
        text:
          type: string
          description: Error message text
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
          description: List of error details
    Alert:
      type: object
      properties:
        id:
          type: integer
          description: Unique alert identifier
        priority:
          type: string
          description: Alert priority level
        severity:
          type: string
          description: Alert severity level
        type:
          type: string
          description: Type of alert
        state:
          type: string
          description: Current state of the alert
          enum:
            - unresolved
            - inprogress
            - resolved
            - dismissed
            - ignored
        computerName:
          type: string
          description: Name of the affected computer
        computerIpAddress:
          type: string
          description: IP address of the affected computer
        guid:
          type: string
          description: Globally unique identifier for the alert
        intelDocId:
          type: integer
          description: Associated intel document identifier
        alertedAt:
          type: string
          format: date-time
          description: Timestamp when the alert was generated
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the alert record was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the alert was last updated
    Connection:
      type: object
      properties:
        id:
          type: string
          description: Unique connection identifier
        hostname:
          type: string
          description: Hostname of the connected endpoint
        ip:
          type: string
          description: IP address of the connected endpoint
        platform:
          type: string
          description: Operating system platform
        status:
          type: string
          description: Current connection status
        initiatedAt:
          type: string
          format: date-time
          description: Timestamp when the connection was initiated
        connectedAt:
          type: string
          format: date-time
          description: Timestamp when the connection was established
        message:
          type: string
          description: Status message for the connection
        clientId:
          type: string
          description: Tanium client identifier
        userId:
          type: integer
          description: User who initiated the connection
        eid:
          type: string
          description: Endpoint identifier
        personaId:
          type: integer
          description: Persona identifier
        hasTools:
          type: boolean
          description: Whether endpoint has investigation tools deployed
    Snapshot:
      type: object
      properties:
        uuid:
          type: string
          description: Unique snapshot identifier
        name:
          type: string
          description: Snapshot name
        hostname:
          type: string
          description: Source endpoint hostname
        connectionId:
          type: string
          description: Associated connection identifier
        evidenceType:
          type: string
          description: Type of evidence in the snapshot
        size:
          type: integer
          description: Snapshot size in bytes
        isUpload:
          type: boolean
          description: Whether the snapshot was uploaded
        recorderVersion:
          type: string
          description: Recorder version on the endpoint
        created:
          type: string
          format: date-time
          description: Snapshot creation timestamp
        completed:
          type: string
          format: date-time
          description: Snapshot completion timestamp
    SnapshotTask:
      type: object
      properties:
        taskId:
          type: string
          description: Task identifier for the snapshot operation
        status:
          type: string
          description: Current task status
        startTime:
          type: string
          format: date-time
          description: Task start timestamp
        connection:
          type: object
          properties:
            id:
              type: string
          description: Associated connection reference
    Event:
      type: object
      properties:
        id:
          type: integer
          description: Event identifier
        timestamp:
          type: string
          format: date-time
          description: Event timestamp
        operation:
          type: string
          description: Operation type performed
        processId:
          type: integer
          description: Process identifier
        pid:
          type: integer
          description: Operating system process ID
        processPath:
          type: string
          description: Path to the process executable
        processTableId:
          type: integer
          description: Process table identifier
        processCommandLine:
          type: string
          description: Full command line of the process
        parentCommandLine:
          type: string
          description: Command line of the parent process
        processHash:
          type: string
          description: Hash of the process executable
        userName:
          type: string
          description: User running the process
        groupName:
          type: string
          description: Group of the process owner
        file:
          type: string
          description: File path involved in the event
        remoteAddress:
          type: string
          description: Remote IP address for network events
        remoteAddressPort:
          type: integer
          description: Remote port for network events
        localAddress:
          type: string
          description: Local IP address for network events
        localAddressPort:
          type: integer
          description: Local port for network events
        keyPath:
          type: string
          description: Registry key path for registry events
        valueName:
          type: string
          description: Registry value name for registry events
        exitCode:
          type: integer
          description: Process exit code
        imageLoaded:
          type: string
          description: Path to loaded image for image events
        signature:
          type: string
          description: Digital signature information
        signed:
          type: boolean
          description: Whether the file is digitally signed
    ProcessEvent:
      type: object
      properties:
        id:
          type: integer
          description: Event identifier
        type:
          type: string
          description: Event type
        operation:
          type: string
          description: Operation performed
        detail:
          type: string
          description: Event detail information
        timestamp:
          type: string
          format: date-time
          description: Event timestamp
    ProcessInfo:
      type: object
      properties:
        id:
          type: integer
          description: Process identifier
        processTableId:
          type: integer
          description: Process table identifier
        uniqueProcessId:
          type: string
          description: Globally unique process identifier
        pid:
          type: integer
          description: Operating system process ID
        processPath:
          type: string
          description: Path to the process executable
        processHash:
          type: string
          description: Hash of the process executable
        hashTypeName:
          type: string
          description: Hash algorithm used
        userName:
          type: string
          description: User running the process
        groupName:
          type: string
          description: Group of the process owner
        createTime:
          type: string
          format: date-time
          description: Process creation time
        createTimeRaw:
          type: string
          description: Raw process creation timestamp
        endTime:
          type: string
          format: date-time
          description: Process termination time
        endTimeRaw:
          type: string
          description: Raw process termination timestamp
        exitCode:
          type: integer
          description: Process exit code
        parentProcessTableId:
          type: integer
          description: Parent process table identifier
        childrenCount:
          type: integer
          description: Number of child processes
        fileEventsCount:
          type: integer
          description: Number of file events
        networkEventsCount:
          type: integer
          description: Number of network events
        registryEventsCount:
          type: integer
          description: Number of registry events
        processEventsCount:
          type: integer
          description: Number of process events
        dnsEventsCount:
          type: integer
          description: Number of DNS events
        driverEventsCount:
          type: integer
          description: Number of driver events
        imageEventsCount:
          type: integer
          description: Number of image load events
        securityEventsCount:
          type: integer
          description: Number of security events
        context:
          type: string
          description: Process context information
    FileDownload:
      type: object
      properties:
        uuid:
          type: string
          description: Unique file download identifier
        path:
          type: string
          description: Original file path on the endpoint
        hostname:
          type: string
          description: Source endpoint hostname
        hash:
          type: string
          description: File hash value
        size:
          type: integer
          description: File size in bytes
        evidenceType:
          type: string
          description: Type of evidence
        downloaded:
          type: string
          format: date-time
          description: Download completion timestamp
        processCreationTime:
          type: string
          format: date-time
          description: Associated process creation time
        createdBy:
          type: string
          description: File creator user name
        createdByProc:
          type: string
          description: Process that created the file
        lastModified:
          type: string
          format: date-time
          description: File last modification time
        lastModifiedBy:
          type: string
          description: User who last modified the file
        lastModifiedByProc:
          type: string
          description: Process that last modified the file
    FileDownloadTask:
      type: object
      properties:
        taskId:
          type: string
          description: Task identifier for the download operation
        status:
          type: string
          description: Current task status
        startTime:
          type: string
          format: date-time
          description: Task start timestamp
        compress:
          type: boolean
          description: Whether the file is compressed during transfer
        paths:
          type: array
          items:
            type: string
          description: File paths being downloaded
        connection:
          type: object
          properties:
            id:
              type: string
          description: Associated connection reference
    Evidence:
      type: object
      properties:
        uuid:
          type: string
          description: Unique evidence identifier
        name:
          type: string
          description: Evidence item name
        hostname:
          type: string
          description: Source endpoint hostname
        evidenceType:
          type: string
          description: Type of evidence
        type:
          type: string
          description: Evidence classification type
        summary:
          type: string
          description: Summary description
        size:
          type: integer
          description: Evidence size in bytes
        username:
          type: string
          description: Associated user name
        domain:
          type: string
          description: Domain of the associated user
        commandline:
          type: string
          description: Associated command line
        eventtype:
          type: string
          description: Type of event that generated the evidence
        timestamp:
          type: string
          format: date-time
          description: Evidence timestamp
        createTime:
          type: string
          format: date-time
          description: Process creation time
        createTimeRaw:
          type: string
          description: Raw process creation timestamp
        exitCode:
          type: integer
          description: Associated process exit code
        createdAt:
          type: string
          format: date-time
          description: Evidence record creation time
    IntelDocument:
      type: object
      properties:
        id:
          type: integer
          description: Unique intel document identifier
        name:
          type: string
          description: Intel document name
        description:
          type: string
          description: Intel document description
        type:
          type: string
          description: Intel document type (STIX, YARA, OpenIOC, etc.)
        alertCount:
          type: integer
          description: Total number of alerts generated
        unresolvedAlertCount:
          type: integer
          description: Number of unresolved alerts
        labelIds:
          type: array
          items:
            type: integer
          description: Associated label identifiers
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
    Label:
      type: object
      properties:
        id:
          type: integer
          description: Unique label identifier
        name:
          type: string
          description: Label name
        description:
          type: string
          description: Label description
        indicatorCount:
          type: integer
          description: Number of associated indicators
        signalCount:
          type: integer
          description: Number of associated signals
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
