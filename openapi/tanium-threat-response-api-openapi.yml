  /plugin/products/threat-response/api/v1/evidence:
    get:
      operationId: listEvidence
      summary: Tanium List investigation evidence
      description: >-
        Retrieves a paginated list of evidence collected during investigations.
        Evidence can be filtered by hostname and type.
      tags:
        - Evidence
      parameters:
        - name: limit
          in: query
          description: Maximum number of evidence items to return
          schema:
            type: integer
        - name: offset
          in: query
          description: Number of evidence items to skip for pagination
          schema:
            type: integer
        - name: sort
          in: query
          description: Sort order for results
          schema:
            type: string
        - name: hostname
          in: query
          description: Filter by endpoint hostname
          schema:
            type: string
        - name: type
          in: query
          description: Filter by evidence type
          schema:
            type: string
      responses:
        '200':
          description: Evidence retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Evidence'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: createEvidence
      summary: Tanium Create evidence from a process
      description: >-
        Creates an evidence record from a specific process on a connected
        endpoint, preserving investigation findings.
      tags:
        - Evidence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - connection_id
                - ptid
                - hostname
              properties:
                connection_id:
                  type: string
                  description: Connection identifier for the endpoint
                ptid:
                  type: string
                  description: Process table identifier
                hostname:
                  type: string
                  description: Hostname of the endpoint
                summary:
                  type: string
                  description: Summary description of the evidence
      responses:
        '200':
          description: Evidence created successfully
        '400':
          description: Invalid evidence parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /plugin/products/threat-response/api/v1/evidence/{evidenceId}:
    get:
      operationId: getEvidence
      summary: Tanium Get evidence by ID
      description: >-
        Retrieves the full details of a specific evidence item including
        associated process information and timestamps.
      tags:
        - Evidence
      parameters:
        - name: evidenceId
          in: path
          required: true
          description: Unique identifier of the evidence
          schema:
            type: string
      responses:
        '200':
          description: Evidence retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Evidence'
        '404':
          description: Evidence not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteEvidence
      summary: Tanium Delete evidence
      description: >-
        Deletes one or more evidence items. Multiple evidence IDs can be
        provided as a comma-separated list.
      tags:
        - Evidence
      parameters:
        - name: evidenceId
          in: path
          required: true
          description: Evidence ID or comma-separated list of evidence IDs
          schema:
            type: string
      responses:
        '200':
          description: Evidence deleted successfully
        '404':
          description: Evidence not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /plugin/products/threat-response/api/v1/evidence/properties:
    get:
      operationId: getEvidenceProperties
      summary: Tanium Get evidence properties
      description: >-
        Retrieves the available property definitions for evidence items,
