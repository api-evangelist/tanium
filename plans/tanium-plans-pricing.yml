    name: Contact Sales
    type: enterprise
    description: Custom-quoted Tanium platform subscription covering selected modules across the
      customer's endpoint estate. Pricing is driven by endpoint count, module mix, and deployment
      mode.
    entries:
      - label: Endpoint Subscription
        name: endpoint_subscription
        type: subscription
        metric: endpoint
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Module Selection
      - name: Custom Scoping
      - name: Direct Sales Engagement
