description: FinOps placeholder for Tanium. Subscription is sized by endpoint count and selected
  modules; no public per-meter rate card is published.
sources:
  - https://www.tanium.com/products/tanium-platform/
notes: No public billing surface. Meter list reflects the dominant unit of consumption (endpoints)
  but exact rate is not publicly disclosed.
billingModel:
  pricingCategory: Custom / Contact Sales
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Tanium
  ServiceCategory: Endpoint Management
  ProviderName: Tanium
  PublisherName: Tanium Inc.
  InvoiceIssuerName: Tanium Inc.
  BillingCurrency: USD
meters:
  - name: endpoint_subscription
    unit: endpoint
    aggregation: max
    dimensions:
      - module
principles:
  - name: Visibility
    description: Endpoint and module consumption is visible in the Tanium console; cost-side
      visibility lives in the customer's procurement records against the Tanium subscription
      invoice.
  - name: Allocation
    description: Allocation is performed by tagging endpoints to business units inside Tanium and
      reconciling against the subscription line items.
  - name: Optimization
    description: Optimization levers include module right-sizing, retiring unused modules at renewal,
      and consolidating endpoint coverage.
  - name: Accountability
    description: Accountability sits with the security or endpoint operations team that owns the
      Tanium subscription.
