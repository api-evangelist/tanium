naftiko: 1.0.0-alpha2
info:
  label: Tanium Platform REST API — Saved Questions
  description: 'Tanium Platform REST API — Saved Questions. 3 operations. Lead operation: Get Saved Question Results. Self-contained
    Naftiko capability covering one Tanium business surface.'
  tags:
  - Tanium
  - Saved Questions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TANIUM_API_KEY: TANIUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-rest-saved-questions
    baseUri: https://{tanium_server}
    description: Tanium Platform REST API — Saved Questions business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-result_data-saved_question-id
      path: /api/v2/result_data/saved_question/{id}
      operations:
      - name: getsavedquestionresults
        method: GET
        description: Get Saved Question Results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: Numeric identifier of the saved question
          required: true
    - name: api-v2-saved_questions
      path: /api/v2/saved_questions
      operations:
      - name: listsavedquestions
        method: GET
        description: List Saved Questions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v2-saved_questions-by-name-name
      path: /api/v2/saved_questions/by-name/{name}
      operations:
      - name: getsavedquestionbyname
        method: GET
        description: Get A Saved Question By Name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Name of the saved question
          required: true
    authentication:
      type: apikey
      key: session
      value: '{{env.TANIUM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: platform-rest-saved-questions-rest
    port: 8080
    description: REST adapter for Tanium Platform REST API — Saved Questions. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/api/v2/result-data/saved-question/{id}
      name: api-v2-result-data-saved-question-id
      description: REST surface for api-v2-result_data-saved_question-id.
      operations:
      - method: GET
        name: getsavedquestionresults
        description: Get Saved Question Results
        call: platform-rest-saved-questions.getsavedquestionresults
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/saved-questions
      name: api-v2-saved-questions
      description: REST surface for api-v2-saved_questions.
      operations:
      - method: GET
        name: listsavedquestions
        description: List Saved Questions
        call: platform-rest-saved-questions.listsavedquestions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/saved-questions/by-name/{name}
      name: api-v2-saved-questions-by-name-name
      description: REST surface for api-v2-saved_questions-by-name-name.
      operations:
      - method: GET
        name: getsavedquestionbyname
        description: Get A Saved Question By Name
        call: platform-rest-saved-questions.getsavedquestionbyname
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-rest-saved-questions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tanium Platform REST API — Saved Questions. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-saved-question-results
      description: Get Saved Question Results
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-rest-saved-questions.getsavedquestionresults
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-saved-questions
      description: List Saved Questions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-rest-saved-questions.listsavedquestions
      outputParameters:
      - type: object
        mapping: $.
    - name: get-saved-question-name
      description: Get A Saved Question By Name
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-rest-saved-questions.getsavedquestionbyname
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
