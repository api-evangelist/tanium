naftiko: "1.0.0-alpha1"

info:
  label: "Tanium Connect API"
  description: "Tanium Connect REST API for creating and managing data delivery connections that export endpoint data to downstream systems."
  tags:
    - Connections
    - Data Delivery
    - Integration
    - Syslog
    - Webhooks
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TANIUM_API_TOKEN: TANIUM_API_TOKEN
      TANIUM_SERVER: TANIUM_SERVER

capability:
  consumes:
    - type: http
      namespace: tanium-connect
      baseUri: "https://{{TANIUM_SERVER}}"
      description: "Tanium Connect API for data pipeline management"
      authentication:
        type: apikey
        key: session
        value: "{{TANIUM_API_TOKEN}}"
        placement: header
      resources:
        - name: connections
          path: /plugin/products/connect/v1/connections
          description: "Manage data delivery connections"
          operations:
            - name: list-connections
              method: GET
              description: "List all data delivery connections"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum connections to return"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-connection
              method: POST
              description: "Create a new data delivery connection"
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  source: "{{tools.source}}"
                  destination: "{{tools.destination}}"
                  schedule: "{{tools.schedule}}"
                  enabled: "{{tools.enabled}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: destinations
          path: /plugin/products/connect/v1/destinations
          description: "Manage connection destinations"
          operations:
            - name: list-destinations
              method: GET
              description: "List all configured destinations"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8103
      namespace: tanium-connect-rest
      resources:
        - path: /v1/connections
          name: connections
          description: "Data delivery connections"
          operations:
            - method: GET
              name: list-connections
              description: "List connections"
              call: "tanium-connect.list-connections"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: tanium-connect-mcp
      transport: http
      tools:
        - name: list-data-connections
          description: "List all data delivery connections in Tanium Connect"
          hints:
            readOnly: true
            idempotent: true
          call: "tanium-connect.list-connections"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-data-connection
          description: "Create a data delivery connection to export endpoint data to a destination"
          hints:
            readOnly: false
            idempotent: false
          call: "tanium-connect.create-connection"
          with:
            name: "tools.name"
            source: "tools.source"
            destination: "tools.destination"
            schedule: "tools.schedule"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-destinations
          description: "List all configured data delivery destinations (syslog, webhook, file, etc.)"
          hints:
            readOnly: true
            idempotent: true
          call: "tanium-connect.list-destinations"
          outputParameters:
            - type: object
              mapping: "$."
