naftiko: "1.0.0-alpha1"

info:
  label: "Tanium Platform REST API"
  description: "Tanium Platform REST API for endpoint management, questions, sensors, packages, and action deployment."
  tags:
    - Actions
    - Endpoint Management
    - Packages
    - Questions
    - Sensors
    - Unified Endpoint Management
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TANIUM_API_TOKEN: TANIUM_API_TOKEN
      TANIUM_SERVER: TANIUM_SERVER

capability:
  consumes:
    - type: http
      namespace: tanium-platform
      baseUri: "https://{{TANIUM_SERVER}}"
      description: "Tanium Platform REST API for endpoint visibility and control"
      authentication:
        type: apikey
        key: session
        value: "{{TANIUM_API_TOKEN}}"
        placement: header
      resources:
        - name: questions
          path: /api/v2/questions
          description: "Create and manage endpoint questions"
          operations:
            - name: create-question
              method: POST
              description: "Create and ask a question across managed endpoints"
              body:
                type: json
                data:
                  query_text: "{{tools.query_text}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: question-by-id
          path: /api/v2/questions/{id}
          description: "Get a specific question"
          operations:
            - name: get-question
              method: GET
              description: "Get a question by ID"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Question ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: question-results
          path: /api/v2/result_data/question/{id}
          description: "Get question results from endpoints"
          operations:
            - name: get-question-results
              method: GET
              description: "Get question results from endpoints"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Question ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: saved-questions
          path: /api/v2/saved_questions
          description: "List saved questions"
          operations:
            - name: list-saved-questions
              method: GET
              description: "List all saved questions"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: saved-question-results
          path: /api/v2/result_data/saved_question/{id}
          description: "Get results for a saved question"
          operations:
            - name: get-saved-question-results
              method: GET
              description: "Get latest results for a saved question"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Saved question ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: actions
          path: /api/v2/saved_actions
          description: "Deploy actions to endpoints"
          operations:
            - name: create-action
              method: POST
              description: "Create and deploy an action to targeted endpoints"
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  package_spec: "{{tools.package_spec}}"
                  action_group: "{{tools.action_group}}"
                  target_group: "{{tools.target_group}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: packages
          path: /api/v2/packages
          description: "Manage deployment packages"
          operations:
            - name: list-packages
              method: GET
              description: "List all deployment packages"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: sensors
          path: /api/v2/sensors
          description: "Manage endpoint sensors"
          operations:
            - name: list-sensors
              method: GET
              description: "List all sensors"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: groups
          path: /api/v2/groups
          description: "List computer groups"
          operations:
            - name: list-groups
              method: GET
              description: "List all computer groups"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: tanium-platform-rest
      resources:
        - path: /v1/questions
          name: questions
          description: "Endpoint questions"
          operations:
            - method: POST
              name: create-question
              description: "Ask a question to endpoints"
              call: "tanium-platform.create-question"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/packages
          name: packages
          description: "Deployment packages"
          operations:
            - method: GET
              name: list-packages
              description: "List packages"
              call: "tanium-platform.list-packages"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: tanium-platform-mcp
      transport: http
      tools:
        - name: ask-question
          description: "Ask a question to Tanium-managed endpoints using natural language"
          hints:
            readOnly: true
            idempotent: false
          call: "tanium-platform.create-question"
          with:
            query_text: "tools.query_text"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-question-results
          description: "Get results collected from endpoints for a specific question"
          hints:
            readOnly: true
            idempotent: true
          call: "tanium-platform.get-question-results"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-saved-questions
          description: "List all saved questions configured in Tanium"
          hints:
            readOnly: true
            idempotent: true
          call: "tanium-platform.list-saved-questions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-packages
          description: "List all deployment packages available on the Tanium server"
          hints:
            readOnly: true
            idempotent: true
          call: "tanium-platform.list-packages"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-sensors
          description: "List all sensors available for endpoint data collection"
          hints:
            readOnly: true
            idempotent: true
          call: "tanium-platform.list-sensors"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-computer-groups
          description: "List all computer groups for endpoint targeting"
          hints:
            readOnly: true
            idempotent: true
          call: "tanium-platform.list-groups"
          outputParameters:
            - type: object
              mapping: "$."
