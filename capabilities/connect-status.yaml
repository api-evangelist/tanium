naftiko: 1.0.0-alpha2
info:
  label: Tanium Connect API — Status
  description: 'Tanium Connect API — Status. 2 operations. Lead operation: List Connection Execution Logs. Self-contained
    Naftiko capability covering one Tanium business surface.'
  tags:
  - Tanium
  - Status
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TANIUM_API_KEY: TANIUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-status
    baseUri: https://{tanium_server}
    description: Tanium Connect API — Status business capability. Self-contained, no shared references.
    resources:
    - name: plugin-products-connect-v1-logs
      path: /plugin/products/connect/v1/logs
      operations:
      - name: listconnectionlogs
        method: GET
        description: List Connection Execution Logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Maximum number of log entries to return
        - name: offset
          in: query
          type: integer
          description: Number of log entries to skip for pagination
        - name: connectionId
          in: query
          type: integer
          description: Filter logs by connection identifier
    - name: plugin-products-connect-v1-status
      path: /plugin/products/connect/v1/status
      operations:
      - name: getconnectstatus
        method: GET
        description: Get Connect Service Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: session
      value: '{{env.TANIUM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: connect-status-rest
    port: 8080
    description: REST adapter for Tanium Connect API — Status. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/plugin/products/connect/v1/logs
      name: plugin-products-connect-v1-logs
      description: REST surface for plugin-products-connect-v1-logs.
      operations:
      - method: GET
        name: listconnectionlogs
        description: List Connection Execution Logs
        call: connect-status.listconnectionlogs
        with:
          limit: rest.limit
          offset: rest.offset
          connectionId: rest.connectionId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/plugin/products/connect/v1/status
      name: plugin-products-connect-v1-status
      description: REST surface for plugin-products-connect-v1-status.
      operations:
      - method: GET
        name: getconnectstatus
        description: Get Connect Service Status
        call: connect-status.getconnectstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-status-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tanium Connect API — Status. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-connection-execution-logs
      description: List Connection Execution Logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-status.listconnectionlogs
      with:
        limit: tools.limit
        offset: tools.offset
        connectionId: tools.connectionId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-connect-service-status
      description: Get Connect Service Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-status.getconnectstatus
      outputParameters:
      - type: object
        mapping: $.
