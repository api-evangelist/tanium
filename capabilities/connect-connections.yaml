      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-connections.getconnection
      with:
        connectionId: tools.connectionId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-connection
      description: Update A Connection
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: connect-connections.updateconnection
      with:
        connectionId: tools.connectionId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-connection
      description: Delete A Connection
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: connect-connections.deleteconnection
      with:
        connectionId: tools.connectionId
      outputParameters:
      - type: object
        mapping: $.
    - name: disable-connection
      description: Disable A Connection
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: connect-connections.disableconnection
      with:
        connectionId: tools.connectionId
      outputParameters:
      - type: object
        mapping: $.
    - name: enable-connection
      description: Enable A Connection
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: connect-connections.enableconnection
      with:
        connectionId: tools.connectionId
      outputParameters:
      - type: object
        mapping: $.
    - name: run-connection-demand
      description: Run A Connection On Demand
      hints:
        readOnly: false
